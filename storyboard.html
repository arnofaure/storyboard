<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storyboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --border-sel: rgba(255,255,255,0.55);
    --text: #e8e8e8;
    --text-muted: #666;
    --text-dim: #444;
    --accent: #e8e8e8;
    --radius: 6px;
    --radius-lg: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  /* TOOLBAR */
  #toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,13,13,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .tb-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .tb-sep {
    width: 0.5px;
    height: 20px;
    background: var(--border);
    flex-shrink: 0;
  }

  .tb-btn {
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-size: 12px;
    padding: 5px 12px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tb-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .tb-btn.primary {
    border-color: var(--border-hover);
    color: var(--text);
  }
  .tb-btn.primary:hover { background: var(--surface2); }
  .tb-btn.danger { color: #c0392b; border-color: rgba(192,57,43,0.3); }
  .tb-btn.danger:hover { background: rgba(192,57,43,0.08); border-color: rgba(192,57,43,0.6); }

  #shot-count {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: auto;
  }

  .size-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .size-label { font-size: 11px; color: var(--text-dim); }
  #size-range {
    -webkit-appearance: none;
    appearance: none;
    width: 80px;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #size-range::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--text);
    cursor: pointer;
  }

  #sel-bar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 4px 10px;
    background: var(--surface2);
    border-radius: var(--radius);
    border: 0.5px solid var(--border-hover);
  }
  #sel-bar.visible { display: flex; }
  #sel-bar span { color: var(--text-muted); font-size: 12px; }

  /* MAIN */
  #main {
    padding: 20px;
  }

  /* DROPZONE */
  #dropzone {
    border: 1px dashed var(--border);
    border-radius: var(--radius-lg);
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  #dropzone:hover, #dropzone.hover {
    border-color: var(--border-hover);
    background: var(--surface);
  }
  #dropzone svg { color: var(--text-dim); margin-bottom: 4px; }
  #dropzone p { font-size: 13px; color: var(--text-muted); }
  #dropzone small { font-size: 11px; color: var(--text-dim); }
  #file-input { display: none; }

  /* GRID */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--card-w, 220px), 1fr));
    gap: 10px;
    align-items: start;
  }

  /* CARD */
  .frame-card {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--surface);
    overflow: hidden;
    cursor: grab;
    position: relative;
    transition: border-color 0.15s, opacity 0.12s, transform 0.12s;
    user-select: none;
  }
  .frame-card:hover { border-color: var(--border-hover); }
  .frame-card.selected { border-color: var(--border-sel); }
  .frame-card.dragging { opacity: 0.28; transform: scale(0.96); cursor: grabbing; }
  .frame-card.drag-over { border-color: var(--accent); border-style: dashed; }

  /* IMAGE — natural ratio */
  .frame-img {
    width: 100%;
    height: auto;
    display: block;
    pointer-events: none;
  }

  /* FOOTER */
  .frame-footer {
    padding: 7px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 0.5px solid var(--border);
  }
  .shot-num {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .frame-del {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    padding: 2px;
    border-radius: 3px;
    opacity: 0;
    transition: opacity 0.1s, color 0.1s;
    line-height: 1;
  }
  .frame-card:hover .frame-del { opacity: 1; }
  .frame-del:hover { color: #c0392b; }

  /* CHECKBOX */
  .frame-check {
    position: absolute;
    top: 7px;
    left: 7px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.3);
    background: rgba(13,13,13,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.12s;
    cursor: pointer;
    backdrop-filter: blur(4px);
  }
  .frame-card:hover .frame-check,
  .frame-card.selected .frame-check { opacity: 1; }
  .frame-check.checked {
    background: var(--text);
    border-color: var(--text);
  }
  .frame-check.checked svg { display: block; }
  .frame-check svg { display: none; width: 10px; height: 10px; }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--surface2);
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius);
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text-muted);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s;
    pointer-events: none;
    opacity: 0;
    z-index: 999;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* EXPORT SPINNER */
  #spinner {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13,13,13,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: var(--text-muted);
    font-size: 12px;
  }
  #spinner.show { display: flex; }
  .spin-ring {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* PRINT / PDF LAYOUT */
  @media print {
    #toolbar, #dropzone, .frame-del, .frame-check, #toast, #spinner { display: none !important; }
    body { background: #fff; color: #000; }
    #main { padding: 12mm; }
    #grid { grid-template-columns: repeat(3, 1fr); gap: 6mm; }
    .frame-card { border: 0.5px solid #ddd; background: #fff; break-inside: avoid; }
    .frame-footer { border-top-color: #ddd; }
    .shot-num { color: #888; }
  }
</style>
</head>
<body>

<div id="toolbar">
  <span class="tb-title">Storyboard</span>
  <div class="tb-sep"></div>
  <button class="tb-btn primary" onclick="document.getElementById('file-input').click()">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
    Importer
  </button>
  <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this.files)">

  <div id="sel-bar">
    <span id="sel-count">0 sél.</span>
    <button class="tb-btn danger" onclick="deleteSelected()">Supprimer</button>
    <button class="tb-btn" onclick="clearSelection()">Désélectionner</button>
  </div>

  <div style="margin-left:auto;display:flex;align-items:center;gap:12px;">
    <span id="shot-count"></span>
    <div class="tb-sep"></div>
    <div class="size-wrap">
      <span class="size-label">Taille</span>
      <input type="range" id="size-range" min="120" max="380" value="220" step="10" oninput="updateSize(this.value)">
    </div>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="exportImages()" title="Exporter chaque frame en PNG">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4 16l4-4 4 4m4-4l4 4M4 20h16M12 3v13"/></svg>
      Images
    </button>
    <button class="tb-btn" onclick="exportPDF()" title="Exporter en PDF">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 7h4m-4 4h6m-6 4h4"/></svg>
      PDF
    </button>
  </div>
</div>

<div id="main">
  <div id="dropzone"
    onclick="document.getElementById('file-input').click()"
    ondrop="handleDrop(event)"
    ondragover="handleDzOver(event)"
    ondragleave="handleDzLeave(event)">
    <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
      <path d="M4 16l4-4 4 4m0 0l4-4 4 4M4 20h16M12 3v13"/>
    </svg>
    <p>Déposer des images ici ou cliquer pour importer</p>
    <small>PNG, JPG, WEBP — les ratios originaux sont préservés</small>
  </div>
  <div id="grid"></div>
</div>

<div id="toast"></div>

<div id="spinner">
  <div class="spin-ring"></div>
  <span id="spinner-label">Export en cours...</span>
</div>

<script>
let frames = [];
let dragSrc = null;
let selectedIds = new Set();

function uid() { return Math.random().toString(36).slice(2,9); }

function updateSize(v) {
  document.getElementById('grid').style.setProperty('--card-w', v + 'px');
}
document.getElementById('grid').style.setProperty('--card-w', '220px');

// --- DROP ZONE ---
function handleDzOver(e) { e.preventDefault(); e.currentTarget.classList.add('hover'); }
function handleDzLeave(e) { e.currentTarget.classList.remove('hover'); }
function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('hover');
  if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
}

function handleFiles(files) {
  const imgs = [...files].filter(f => f.type.startsWith('image/'));
  let loaded = 0;
  imgs.forEach(f => {
    const id = uid();
    const url = URL.createObjectURL(f);
    frames.push({ id, url, name: f.name });
    loaded++;
    if (loaded === imgs.length) render();
  });
  if (!imgs.length) return;
}

// --- RENDER ---
function render() {
  const grid = document.getElementById('grid');
  const sc = document.getElementById('shot-count');
  sc.textContent = frames.length ? frames.length + ' shot' + (frames.length > 1 ? 's' : '') : '';
  grid.innerHTML = '';

  frames.forEach((fr, i) => {
    const card = document.createElement('div');
    card.className = 'frame-card' + (selectedIds.has(fr.id) ? ' selected' : '');
    card.dataset.id = fr.id;
    card.draggable = true;

    // Checkbox
    const check = document.createElement('div');
    check.className = 'frame-check' + (selectedIds.has(fr.id) ? ' checked' : '');
    check.innerHTML = `<svg viewBox="0 0 10 10" fill="none" stroke="#0d0d0d" stroke-width="2"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>`;
    check.onclick = e => { e.stopPropagation(); toggleSelect(fr.id); };

    // Image — natural ratio, no forced wrapper height
    const img = document.createElement('img');
    img.className = 'frame-img';
    img.src = fr.url;
    img.alt = 'Shot ' + (i + 1);
    img.loading = 'lazy';

    // Footer
    const footer = document.createElement('div');
    footer.className = 'frame-footer';
    const num = document.createElement('span');
    num.className = 'shot-num';
    num.textContent = String(i + 1).padStart(2, '0');
    const del = document.createElement('button');
    del.className = 'frame-del';
    del.title = 'Supprimer';
    del.innerHTML = `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>`;
    del.onclick = e => { e.stopPropagation(); deleteFrame(fr.id); };

    footer.appendChild(num);
    footer.appendChild(del);
    card.appendChild(check);
    card.appendChild(img);
    card.appendChild(footer);

    // Drag events
    card.addEventListener('dragstart', onDragStart);
    card.addEventListener('dragover', onDragOver);
    card.addEventListener('dragleave', onDragLeave);
    card.addEventListener('drop', onDropCard);
    card.addEventListener('dragend', onDragEnd);

    grid.appendChild(card);
  });

  updateSelBar();
}

function toggleSelect(id) {
  selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id);
  render();
}
function clearSelection() { selectedIds.clear(); render(); }
function deleteSelected() {
  frames = frames.filter(f => !selectedIds.has(f.id));
  selectedIds.clear();
  render();
}
function deleteFrame(id) {
  selectedIds.delete(id);
  frames = frames.filter(f => f.id !== id);
  render();
}
function updateSelBar() {
  const bar = document.getElementById('sel-bar');
  const sc = document.getElementById('sel-count');
  if (selectedIds.size > 0) {
    bar.classList.add('visible');
    sc.textContent = selectedIds.size + ' sél.';
  } else {
    bar.classList.remove('visible');
  }
}

// --- DRAG & DROP REORDER ---
function onDragStart(e) {
  dragSrc = this.dataset.id;
  setTimeout(() => this.classList.add('dragging'), 0);
}
function onDragOver(e) {
  e.preventDefault();
  if (this.dataset.id !== dragSrc) this.classList.add('drag-over');
}
function onDragLeave() { this.classList.remove('drag-over'); }
function onDropCard(e) {
  e.preventDefault();
  this.classList.remove('drag-over');
  const tid = this.dataset.id;
  if (!tid || tid === dragSrc) return;
  const si = frames.findIndex(f => f.id === dragSrc);
  const ti = frames.findIndex(f => f.id === tid);
  if (si < 0 || ti < 0) return;
  const [m] = frames.splice(si, 1);
  frames.splice(ti, 0, m);
  render();
}
function onDragEnd() {
  document.querySelectorAll('.frame-card').forEach(c => c.classList.remove('dragging', 'drag-over'));
  dragSrc = null;
}

// --- TOAST ---
function toast(msg, duration = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// --- EXPORT IMAGES ---
async function exportImages() {
  if (!frames.length) { toast('Aucune image à exporter.'); return; }
  toast('Téléchargement en cours...');
  frames.forEach((fr, i) => {
    const a = document.createElement('a');
    a.href = fr.url;
    a.download = 'shot_' + String(i + 1).padStart(2, '0') + '_' + fr.name;
    a.click();
  });
}

// --- EXPORT PDF ---
async function exportPDF() {
  if (!frames.length) { toast('Aucune image à exporter.'); return; }

  const spinner = document.getElementById('spinner');
  const spinnerLabel = document.getElementById('spinner-label');
  spinner.classList.add('show');

  try {
    const { jsPDF } = window.jspdf;

    // A4 landscape
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    const pageW = 297;
    const pageH = 210;
    const margin = 12;
    const cols = 3;
    const rows = 2;
    const perPage = cols * rows;
    const cellW = (pageW - margin * 2 - (cols - 1) * 6) / cols;
    const cellH = (pageH - margin * 2 - (rows - 1) * 8 - 8) / rows; // -8 for label
    const gapX = 6;
    const gapY = 8;
    const labelH = 5;

    let first = true;
    for (let i = 0; i < frames.length; i++) {
      const pos = i % perPage;
      if (pos === 0 && !first) pdf.addPage();
      first = false;

      spinnerLabel.textContent = `Export PDF — ${i + 1} / ${frames.length}`;

      const col = pos % cols;
      const row = Math.floor(pos / cols);
      const x = margin + col * (cellW + gapX);
      const y = margin + row * (cellH + gapY + labelH);

      // Draw frame border
      pdf.setDrawColor(60, 60, 60);
      pdf.setLineWidth(0.2);
      pdf.rect(x, y, cellW, cellH);

      // Load image and fit inside cell preserving ratio
      await new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const ir = img.naturalWidth / img.naturalHeight;
          const cr = cellW / cellH;
          let iw, ih, ix, iy;
          if (ir > cr) { iw = cellW; ih = cellW / ir; ix = x; iy = y + (cellH - ih) / 2; }
          else { ih = cellH; iw = cellH * ir; iy = y; ix = x + (cellW - iw) / 2; }
          pdf.addImage(img, 'JPEG', ix, iy, iw, ih);
          resolve();
        };
        img.src = frames[i].url;
      });

      // Shot label below
      pdf.setFontSize(7);
      pdf.setTextColor(140, 140, 140);
      pdf.text(String(i + 1).padStart(2, '0'), x + 1, y + cellH + labelH - 0.5);
    }

    pdf.save('storyboard.pdf');
    toast('PDF exporté.');
  } catch(err) {
    console.error(err);
    toast('Erreur export PDF.');
  } finally {
    spinner.classList.remove('show');
  }
}
</script>
</body>
</html>
